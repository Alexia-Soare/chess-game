<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="theme-toggle" type="button" class="btn theme-toggle">Purple Theme</button>
  <main class="app">
    <h1>Chess</h1>
    <p id="status" class="status">White to move</p>
    <div class="game-layout">
      <div id="board" class="board" aria-label="Chess board"></div>
      <section class="move-legend" aria-label="Move history">
        <h2 class="move-legend-title">Moves</h2>
        <div id="move-list" class="move-list">
          <p class="move-empty">No moves yet</p>
        </div>
      </section>
    </div>
    <div class="actions">
      <button id="reset" type="button" class="btn reset">New Game</button>
    </div>
  </main>
  <script src="chess.js"></script>
</body>
</html>
