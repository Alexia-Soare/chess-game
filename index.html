<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="skin-picker-toggle" type="button" class="btn skin-picker-toggle" aria-expanded="false" aria-controls="skin-picker">
    Skins
  </button>

  <aside id="skin-picker" class="skin-picker" aria-label="Appearance settings" hidden>
    <div class="skin-picker-header">
      <h2 class="skin-picker-title">Customize</h2>
      <button id="skin-picker-close" type="button" class="skin-picker-close" aria-label="Close">×</button>
    </div>

    <section class="skin-section">
      <h3 class="skin-section-title">Background</h3>
      <div id="background-skins" class="skin-grid" role="radiogroup" aria-label="Background theme"></div>
    </section>

    <section class="skin-section">
      <h3 class="skin-section-title">Pieces</h3>
      <div id="piece-skins" class="skin-grid" role="radiogroup" aria-label="Piece style"></div>
    </section>
  </aside>

  <div id="skin-picker-backdrop" class="skin-picker-backdrop" hidden></div>

  <main class="app">
    <h1>Chess</h1>
    <p id="status" class="status">White to move</p>
    <div class="game-layout">
      <div id="board" class="board" aria-label="Chess board"></div>
      <section class="move-legend" aria-label="Move history">
        <h2 class="move-legend-title">Moves</h2>
        <div id="move-list" class="move-list">
          <p class="move-empty">No moves yet</p>
        </div>
      </section>
    </div>
    <div class="actions">
      <button id="reset" type="button" class="btn reset">New Game</button>
    </div>
  </main>
  <script src="chess.js"></script>
</body>
</html>
